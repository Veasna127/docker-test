<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker Test Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:600px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    color:#333;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:25px;
    line-height:1.6;
}

.status{
    display:inline-block;
    background:#d4edda;
    color:#155724;
    padding:10px 20px;
    border-radius:30px;
    margin-bottom:25px;
    font-weight:bold;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#667eea;
    color:white;
    padding:12px 25px;
    border-radius:8px;
    transition:0.3s;
}

.btn:hover{
    background:#4f63d2;
}

.footer{
    margin-top:25px;
    color:#999;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">🐳</div>

    <h1>Docker Website Test</h1>

    <p>
        Congratulations! Your Docker container and Nginx web server
        are working successfully.
    </p>

    <div class="status">
        ✅ Container Running
    </div>

    <br>

    <a href="#" class="btn">Docker is Working</a>

    <div class="footer">
        Powered by Docker + Nginx
    </div>
</div>

</body>
</html>
