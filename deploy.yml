name: Deploy Static Site

# Trigger: runs every time you push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Server
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: SSH into your machine and redeploy
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/my-static-site
            git pull origin main
            docker rm -f my-site || true
            docker rmi my-static-site || true
            docker build --no-cache -t my-static-site .
            docker run -d --name my-site -p 80:80 my-static-site
            echo "✅ Deployed successfully!"